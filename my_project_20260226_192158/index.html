<!DOCTYPE html>
<html>
<head>
<title>동화 덱빌딩 PVE 게임</title>
<style>
body {
  font-family: "Noto Sans KR", sans-serif;
  background-color: #F2F2F2;
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background-image: url('static/images/background.png');
  background-size: cover;
  background-position: center;
}

.container {
  background-color: rgba(255, 255, 255, 0.8);
  border-radius: 10px;
  padding: 40px;
  box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
  text-align: center;
  width: 80%;
  max-width: 800px;
}

h1 {
  font-family: "둥근고딕", sans-serif;
  color: #4A90E2;
  margin-bottom: 20px;
}

p {
  font-size: 16px;
  line-height: 1.6;
  color: #333;
}

.button {
  background-image: url('static/images/button.png');
  background-size: cover;
  color: #fff;
  font-size: 18px;
  padding: 12px 24px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: background-image 0.3s ease;
  margin-top: 20px;
}

.button:hover {
  background-image: url('static/images/button_hover.png');
}

.button:active {
  background-image: url('static/images/button_pressed.png');
}

/* 카드 스타일 */
.card-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 20px;
}

.card {
    width: 150px;
    height: 200px;
    border: 2px solid #9013FE;
    border-radius: 10px;
    margin: 10px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    background-color: #fff;
}

.card-title {
    font-size: 16px;
    font-weight: bold;
    color: #D0021B;
}

.card-description {
    font-size: 12px;
    color: #333;
    text-align: center;
}

.card-image {
    width: 80px;
    height: 80px;
    border-radius: 5px;
    background-color: #eee; /* Placeholder */
}
</style>
</head>
<body>

<div class="container">
  <h1>동화 덱빌딩 PVE 게임</h1>
  <p>아기자기한 동화 캐릭터와 함께 덱을 구성하고, 흥미진진한 PVE 전투를 즐겨보세요!</p>
  <button class="button">게임 시작</button>

  <div class="card-container">
        <div class="card">
            <div class="card-image"></div>
            <div class="card-title">백설공주</div>
            <div class="card-description">사과를 사용하여 적을 약화시킵니다.</div>
        </div>
        <div class="card">
            <div class="card-image"></div>
            <div class="card-title">신데렐라</div>
            <div class="card-description">유리 구두로 아군을 강화합니다.</div>
        </div>
        <div class="card">
            <div class="card-image"></div>
            <div class="card-title">빨간망토</div>
            <div class="card-description">늑대를 물리치고 강력한 공격을 합니다.</div>
        </div>
    </div>
</div>

</body>
</html>
